<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md relative">

    <!-- Botão Voltar para a Home -->
    <button routerLink="/" class="absolute -top-12 left-0 text-blue-600 hover:text-blue-800 flex items-center text-sm font-medium transition-colors">
      <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Voltar para a Home
    </button>

    <div class="flex justify-center">
      <div class="h-12 w-12 bg-blue-700 text-white rounded-lg flex items-center justify-center font-extrabold text-3xl shadow-lg">R</div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">Acesse sua conta</h2>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">E-mail corporativo</label>
          <div class="mt-1">
            <input id="email" type="email" formControlName="email"
                   class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
          <div class="mt-1">
            <input id="password" type="password" formControlName="password"
                   class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          </div>
        </div>

        <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 mb-4">
          <p class="text-sm text-red-700">{{ errorMessage }}</p>
        </div>

        <div>
          <button type="submit" [disabled]="loginForm.invalid || isLoading"
                  class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-gray-400">
            {{ isLoading ? 'Autenticando...' : 'Entrar no Sistema' }}
          </button>
        </div>
      </form>

      <!-- NOVO: Link para Cadastro -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          Ainda não é funcionário registrado?
          <a routerLink="/register" class="font-medium text-blue-600 hover:text-blue-500">Crie sua conta aqui</a>
        </p>
      </div>

    </div>
  </div>
</div>
