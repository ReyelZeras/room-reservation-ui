<!-- A NOSSA NAVBAR MODULAR E RECICLÁVEL -->
<app-navbar></app-navbar>

<div class="min-h-screen bg-gray-50 relative">
  <div class="max-w-3xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="bg-blue-600 px-6 py-4">
        <h2 class="text-xl font-bold text-white">Configurações da Conta</h2>
      </div>
      
      <div class="p-6">
        <div *ngIf="successMessage" class="mb-6 bg-green-50 border-l-4 border-green-500 p-4 rounded-md">
          <p class="text-sm text-green-700 font-medium">{{ successMessage }}</p>
        </div>
        <div *ngIf="errorMessage" class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
          <p class="text-sm text-red-700 font-medium">{{ errorMessage }}</p>
        </div>

        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
          <div class="space-y-6">
            <div>
              <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
              <input type="text" formControlName="name" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">E-mail Corporativo</label>
              <input type="email" formControlName="email" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            
            <div class="pt-4 border-t border-gray-100 flex justify-end">
              <button type="submit" [disabled]="profileForm.invalid || isLoading" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-md shadow-sm disabled:bg-gray-400 transition-colors">
                {{ isLoading ? 'Salvando...' : 'Atualizar Perfil' }}
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
